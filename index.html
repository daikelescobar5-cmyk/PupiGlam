<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PupiGlam</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}
.producto {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
    width: 200px;
}
img {
    width: 100%;
    border-radius: 10px;
}
button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<h1>🛒 Mi Tienda</h1>

<div id="productos"></div>

<script>
//let numero = "+5359227882";

// 📦 LISTA DE PRODUCTOS (tú los editas aquí)
let productos = [
    {
        nombre: "llaveros",
        precio: "$200",
        imagen: "https://via.placeholder.com/200"
    },
    {
        nombre: "Producto 2",
        precio: "$20",
        imagen: "https://via.placeholder.com/200"
    }
];

// 🧠 CREAR PRODUCTOS EN LA WEB
let contenedor = document.getElementById("productos");

productos.forEach(p => {
    let mensaje = `Hola, quiero comprar ${p.nombre} por ${p.precio}`;
    let link = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    contenedor.innerHTML += `
        <div class="producto">
            <img src="${p.imagen}">
            <h3>${p.nombre}</h3>
            <p>${p.precio}</p>
            <a href="${link}" target="_blank">
                <button>Comprar por WhatsApp</button>
            </a>
        </div>
    `;
});
</script>

</body>
</html>
